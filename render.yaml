services:
  # Laravel Backend Service
  - type: web
    name: stockflow-api
    env: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      php artisan migrate --force
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://stock-meuve.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: APP_KEY
        generateValue: true
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1

  # Next.js Frontend Service
  - type: web
    name: stockmeuve-frontend
    env: node
    plan: free
    buildCommand: yarn install && yarn build
    startCommand: yarn start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://stockflow-api.onrender.com/api

databases:
  # We're using SQLite, so no external database needed
