name: Laravel Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths-ignore:
      - 'frontend/**'
      - '**.md'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, mbstring, tokenizer, xml, ctype, json

      - name: Cache composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Copy env and generate key
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testdb
          DB_USERNAME: postgres
          DB_PASSWORD: secret
        run: php artisan test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cPanel Git deploy
        run: |
          echo "=== DEPLOYMENT STARTED ===" 
          echo "Timestamp: $(date)"
          echo "Repository: adejoy28/stock-meuve"
          echo "Branch: main"
          echo "Target: /home/${{ secrets.CPANEL_USER }}/charlyhb"
          echo ""
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControl/update?repository_root=/home/${{ secrets.CPANEL_USER }}/charlyhb")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "cPanel API Response:"
          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body: $BODY"
          echo ""
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "=== DEPLOYMENT SUCCESS ==="
          else
            echo "=== DEPLOYMENT FAILED ==="
            exit 1
          fi

      - name: Poll until site is up
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.CPANEL_HOST }}/api/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Site is up"
              exit 0
            fi
            sleep 10
          done
          echo "Site did not come up in time"
          exit 1