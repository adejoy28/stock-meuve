---
deployment:
  tasks:
    - export DEPLOYPATH=/home/yourusername/public_html/api
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R . $DEPLOYPATH
    - cd $DEPLOYPATH && /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
    - cd $DEPLOYPATH && php artisan down --render="errors::503" --retry=60
    - cd $DEPLOYPATH && php artisan config:cache
    - cd $DEPLOYPATH && php artisan route:cache
    - cd $DEPLOYPATH && php artisan migrate --force
    - cd $DEPLOYPATH && php artisan queue:restart
    - cd $DEPLOYPATH && php artisan up