deployment:
  tasks:
    - export DEPLOYPATH=/home/vjxzcyjr/charlyhb
    - cd $DEPLOYPATH

    - echo "DEPLOY START" >> deploy.log

    - php artisan down || true
    - echo "APP DOWN" >> deploy.log

    - echo "COMPOSER INSTALLED" >> deploy.log
    - /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction

    - echo "PHP VERSION" >> deploy.log
    - php -v

    - echo "KEY GENERATED" >> deploy.log
    - php artisan key:generate

    - echo "CONFIG CLEARED" >> deploy.log
    - php artisan config:clear >> deploy.log 2>&1

    - echo "CACHE CLEARED" >> deploy.log
    - php artisan cache:clear >> deploy.log 2>&1

    - echo "CONFIG CACHED" >> deploy.log
    - php artisan config:cache >> deploy.log 2>&1

    - echo "ROUTES CACHED" >> deploy.log
    - php artisan route:cache >> deploy.log 2>&1
    
    - php artisan migrate --force
    - echo "MIGRATED" >> deploy.log

    - php artisan queue:restart || true
    - echo "QUEUE RESTARTED" >> deploy.log

    - php artisan up || true
    - echo "DEPLOY DONE" >> deploy.log

