deployment:
  tasks:
    - export DEPLOYPATH=/home/vjxzcyjr/charlyhb
    - cd $DEPLOYPATH

    - mkdir -p storage/logs/backend
    - echo "=== DEPLOYMENT STARTED ===" >> storage/logs/backend/deploy.log
    - echo "Timestamp: $(date)" >> storage/logs/backend/deploy.log
    - echo "User: $(whoami)" >> storage/logs/backend/deploy.log
    - echo "Path: $DEPLOYPATH" >> storage/logs/backend/deploy.log

    - php artisan down || true
    - echo "APP DOWN" >> storage/logs/backend/deploy.log

    - echo "COMPOSER INSTALLING..." >> storage/logs/backend/deploy.log
    - /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction

    - echo "PHP VERSION" >> storage/logs/backend/deploy.log
    - php -v >> storage/logs/backend/deploy.log 2>&1

    - echo "KEY GENERATED" >> storage/logs/backend/deploy.log
    - php artisan key:generate >> storage/logs/backend/deploy.log 2>&1

    - echo "CONFIG CLEARED" >> storage/logs/backend/deploy.log
    - php artisan config:clear >> storage/logs/backend/deploy.log 2>&1

    - echo "CACHE CLEARED" >> storage/logs/backend/deploy.log
    - php artisan cache:clear >> storage/logs/backend/deploy.log 2>&1

    - echo "CONFIG CACHED" >> storage/logs/backend/deploy.log
    - php artisan config:cache >> storage/logs/backend/deploy.log 2>&1

    - echo "ROUTES CACHED" >> storage/logs/backend/deploy.log
    - php artisan route:cache >> storage/logs/backend/deploy.log 2>&1
    
    - echo "RUNNING MIGRATIONS..." >> storage/logs/backend/deploy.log
    - php artisan migrate --force >> storage/logs/backend/deploy.log 2>&1
    - echo "MIGRATIONS COMPLETED" >> storage/logs/backend/deploy.log

    - php artisan queue:restart || true
    - echo "QUEUE RESTARTED" >> storage/logs/backend/deploy.log

    - php artisan up || true
    - echo "=== DEPLOYMENT COMPLETED ===" >> storage/logs/backend/deploy.log
    - echo "Timestamp: $(date)" >> storage/logs/backend/deploy.log

