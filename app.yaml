name: stockmeuve-api
services:
- name: api
  source_dir: .
  github:
    repo: adejoy28/stock-meuve
    branch: main
  run_command: "php artisan serve --host 0.0.0.0 --port 8080"
  environment_slug: php
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: APP_ENV
    value: production
  - key: APP_KEY
    value: "base64:YOUR_APP_KEY_HERE"
  - key: DB_CONNECTION
    value: sqlite
  - key: APP_URL
    value: https://stock-meuve.onrender.com
